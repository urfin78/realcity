name: Release & Deploy

# Manuell ausgelöst — NICHT jeder Push deployt. Ein Release ist eine bewusste Entscheidung.
on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # für Tag, Release und gh-pages-Push

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Letzten Versions-Tag ermitteln
        id: latest_tag
        run: |
          latest=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          echo "tag=${latest:-v0.0.0}" >> "$GITHUB_OUTPUT"

      - name: Version-Bump aus Commit-Messages bestimmen
        id: bump
        run: |
          latest="${{ steps.latest_tag.outputs.tag }}"
          if git rev-parse "$latest" >/dev/null 2>&1; then
            commits=$(git log "$latest"..HEAD --pretty=format:"%s")
          else
            commits=$(git log --pretty=format:"%s")
          fi
          if [ -z "$commits" ]; then
            echo "bump=none" >> "$GITHUB_OUTPUT"
          elif echo "$commits" | grep -qE "^.+!:|BREAKING CHANGE"; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
          elif echo "$commits" | grep -qE "^feat(\(.+\))?:"; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Neue Version berechnen
        id: version
        if: steps.bump.outputs.bump != 'none'
        run: |
          version="${{ steps.latest_tag.outputs.tag }}"
          version="${version#v}"; version="${version%%-*}"
          IFS='.' read -r major minor patch <<< "$version"
          major=${major:-0}; minor=${minor:-0}; patch=${patch:-0}
          case "${{ steps.bump.outputs.bump }}" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          echo "tag=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      - name: Release-Notes erzeugen
        if: steps.bump.outputs.bump != 'none'
        run: |
          latest="${{ steps.latest_tag.outputs.tag }}"
          if git rev-parse "$latest" >/dev/null 2>&1; then
            git log "$latest"..HEAD --pretty=format:"- %s" | grep -v "^- Merge" > release_notes.txt || true
          else
            git log --pretty=format:"- %s" | grep -v "^- Merge" > release_notes.txt || true
          fi

      - name: GitHub Release anlegen
        if: steps.bump.outputs.bump != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file release_notes.txt

      # Statisches Spiel = index.html + src/ + maps/. Kein Build, keine npm-Schritte.
      - name: Auf gh-pages deployen
        if: steps.bump.outputs.bump != 'none'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Zu deployende Spiel-Inhalte in temporäres Verzeichnis sichern
          mkdir -p /tmp/deploy
          cp -r index.html src maps /tmp/deploy/

          if git ls-remote --exit-code --heads origin gh-pages > /dev/null; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
          fi

          # Arbeitsverzeichnis leeren (außer .git), dann Deploy-Inhalt einspielen
          find . -maxdepth 1 -not -name '.git' -not -name '.' -exec rm -rf {} +
          cp -r /tmp/deploy/* .
          touch .nojekyll   # verhindert Jekyll-Verarbeitung der src/-Dateien

          git add -A
          git diff --staged --quiet || git commit -m "deploy: ${{ steps.version.outputs.tag }}"
          git push origin gh-pages

      - name: Kein Release nötig
        if: steps.bump.outputs.bump == 'none'
        run: echo "Keine neuen Commits seit dem letzten Tag — nichts zu releasen."
